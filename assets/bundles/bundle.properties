# ===== PU_V8 物品运输方块 (传送器 + 传送带) =====
block.create-teleporter.name=传送器
block.create-teleporter.description=按颜色和队伍分桶传送物品。\n[lightgray]用法:[] 点击切换颜色频道（12种颜色可选）。放置后选择一个颜色，同色同队的传送器互相连通，物品进入后立即转送到目标传送器内部。\n[lightgray]耗电:[] 仅在传送物品时耗电，闲置时不耗电。\n[lightgray]取出:[] 自动输出接收到的物品到任意方向。

block.create-steel-conveyor.name=钢制传送带
block.create-steel-conveyor.description=速度比原版快，视觉动画更快。\n[lightgray]用法:[] 同普通传送带，可吸收经验球。

block.create-mechanical-conveyor.name=机械传送带
block.create-mechanical-conveyor.description=基础机械传送带，带影子贴图视觉过渡。\n[lightgray]用法:[] 同普通传送带，自动在首尾位置渲染影子贴图用于视觉过渡。

block.create-dirium-conveyor.name=迪里姆合金传送带
block.create-dirium-conveyor.description=可吸收经验的传送带。\n[lightgray]用法:[] 同普通传送带，但拥有完整经验系统：等级 0-10，经验满级后获得伤害减免。\n[lightgray]经验:[] 接受经验球/古代塔/古代节点注入；死亡时散落部分经验球；可被经验集线器链接抽取部分经验。

# ===== PU_V8 扭矩系统方块 =====
# --- 动力方块 (扭矩产生) ---
block.create-hand-crank.name=手摇柄
block.create-hand-crank.description=通过手动旋转产生扭矩。\n[lightgray]用法:[] 点击方块产生瞬时扭矩（一次旋转）。需要连接到传动轴/齿轮箱网络。

block.create-wind-turbine.name=风力涡轮机
block.create-wind-turbine.description=从风中产生扭矩。\n[lightgray]用法:[] 自动旋转产生扭矩，输出由风速决定。3x3 方块，顶端连接传动轴。

block.create-water-turbine.name=水力涡轮机
block.create-water-turbine.description=从水流中产生扭矩。\n[lightgray]用法:[] 通过水流驱动产生扭矩。3x3，两个端口在中下方位。

block.create-electric-motor.name=电动马达
block.create-electric-motor.description=消耗电力产生扭矩。\n[lightgray]用法:[] 消耗电力产生扭矩，电力越满扭矩越大。3x3，端口在左右方位。

block.create-infi-torque.name=扭矩源
block.create-infi-torque.description=沙盒模式专用扭矩发生器。\n[lightgray]用法:[] 仅沙盒模式可见，输出无限扭矩，4 端口全开。

# --- 分配方块 (扭矩传输) ---
block.create-drive-shaft.name=传动轴
block.create-drive-shaft.description=传递扭矩的基本方块。\n[lightgray]用法:[] 同方向（左右）连接形成传动链。自动根据邻居选择连接形态贴图。

block.create-inline-gearbox.name=直线分轴器
block.create-inline-gearbox.description=将一根传动轴的扭矩分到两根平行轴上。\n[lightgray]用法:[] 2x2 方块，左右各一个端口，同侧两端口共享扭矩。两齿轮两两反向旋转。

block.create-shaft-router.name=轴路由器
block.create-shaft-router.description=接收旋能量并将其分配到3个不同方向。\n[lightgray]用法:[] 4 端口全开（前/后/左/右），共享一个扭矩网络。

block.create-simple-transmission.name=简易变速器
block.create-simple-transmission.description=按 1:2.5 传动比改变扭矩/速度。\n[lightgray]用法:[] 2x2，左侧为输入端，右侧为输出端。能量守恒：高速端低扭，低速端高扭。

# --- 生产方块 (扭矩消耗) ---
block.create-auger-drill.name=螺旋钻头
block.create-auger-drill.description=浅层钻机，能挖掘大量地面。\n[lightgray]用法:[] 3x3，需要达到额定转速才能高效工作，超过额定转速效率会衰减。

block.create-mechanical-extractor.name=螺旋抽水机
block.create-mechanical-extractor.description=使用扭矩抽取液体。\n[lightgray]用法:[] 3x3，效率随转速提升（平方关系）。
