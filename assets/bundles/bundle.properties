block.create-ustone-wall.name=石墙
block.create-ustone-wall.description=简单廉价的墙体。容易被击碎，但组成它的石头出乎意料地耐用，能承受最强的单次打击。因此它有一个有趣的特性：能承受单次毁灭性打击，但如果伤害随时间累积则会碎裂。
block.create-dense-wall.name=致密合金墙
block.create-dense-wall.description=更为致密耐用的墙体。材料的密度使其对高能打击具有高抵抗力。
block.create-steel-wall.name=钢墙
block.create-steel-wall.description=致密耐用的墙体。材料的密度使其对高能打击具有更高的抵抗力。
block.create-steel-wall-large.name=大型钢墙
block.create-steel-wall-large.description=致密耐用的大型墙体。4倍耐久，材料的密度使其对高能打击具有更高的抵抗力。
block.create-dirium-wall.name=迪里姆合金墙
block.create-dirium-wall.description=具有奇特性质的高耐用性墙体。材料的耐久性使其对高能打击具有极高抵抗力，并且在受到打击后似乎能在短时间内抵抗后续伤害。
block.create-dirium-wall-large.name=大型迪里姆合金墙
block.create-dirium-wall-large.description=具有奇特性质的高耐用性大型墙体。4倍耐久，材料的耐久性使其对高能打击具有极高抵抗力，并且在受到打击后似乎能在短时间内抵抗后续伤害。
