# 单位
unit.create-arcnelidia.name=电弧虫
unit.create-arcnelidia.description=带有电弧激光武器的多节飞行单位，由头部和9节段身组成
unit.create-arcnelidia.details=[gray]多节飞行单位，800血量，速度4，护甲5。由头部和9节段身组成。头部装备电弧激光武器，段身投弹（造成范围伤害）。直线冲向目标越过折返。轻微晃动。每秒回复10血。[]

unit.create-toxobyte.name=毒疫虫
unit.create-toxobyte.description=携带瘟疫炮弹和吸附激光的多节飞行单位，由头部和25节段身组成，能够再生新段身
unit.create-toxobyte.details=[gray]多节飞行单位，200血量，速度3。由头部和25节段身组成。头部发射吸附激光（自动回血），段身投掷瘟疫炮弹（造成范围伤害）。环绕目标飞行。每6秒再生一节段身（最多25节）。可分裂（段身死亡时虫子分裂）和链式合并（两条靠近时合并）。每秒回复15血。[]

unit.create-catenapede.name=吸血虫
unit.create-catenapede.description=携带吸血激光和瘟疫导弹的多节飞行单位，由头部和15节段身组成，能够分裂和合并
unit.create-catenapede.details=[gray]多节飞行单位，750血量，速度2.4，护甲5。由头部和最多15节段身组成（初始2段）。头部装备吸血激光（伤害回血，可拉拽敌人），段身投掷瘟疫导弹。环绕目标飞行。每20秒再生一节段身（最多15节）。可分裂和链式合并。每秒回复25血。[]

unit.create-devourer.name=噬界虫
unit.create-devourer.description=End阵营的超级多节飞行单位，由头部和60节段身组成，全状态免疫，头部发射强大激光，段身配备导弹和激光武器
unit.create-devourer.details=[gray]End阵营超级多节飞行单位，1250000血量，速度5。由头部和60节段身组成。头部发射强大激光，段身配备导弹和激光武器。全状态免疫。无再生、无分裂、无合并。每秒回复120血，受到伤害减伤10%。[]

# Correct devourer key (actual registered name in code is devourer-of-eldrich-gods)
unit.create-devourer-of-eldrich-gods.name=Devourer
unit.create-devourer-of-eldrich-gods.description=A super multi-segmented flying unit of the End faction, composed of a head and 60 segment bodies, immune to all status effects, head fires a powerful laser, segments are equipped with missile and laser weapons.
unit.create-devourer-of-eldrich-gods.details=[gray]End faction super multi-segmented flying unit, 1250000 health, speed 5. Composed of a head and 60 segments. Head fires a powerful laser, segments are equipped with missile and laser weapons. Immune to all status effects. No regeneration, no splitting, no merging. Heals 120 health per second, takes 10% reduced damage.[]

unit.create-oppression.name=压迫者
unit.create-oppression.description=End阵营的终极多节飞行单位，由头部和55节段身组成，配备主激光、导弹、虚空门户、慢闪电等多种武器，段身间有液压杆连接
unit.create-oppression.details=[gray]End阵营终极多节飞行单位，2500000血量，速度4.5。由头部和55节段身组成。头部配备多种武器：主激光（充能后射击）、导弹、虚空门户（召唤触手）、慢闪电等。段身间有液压杆连接装饰。大招期间移动和旋转速度大幅降低（非完全锁定）。环绕目标飞行。每秒回复500血，受到伤害减伤30%。[]

unit.create-enigma.name=谜团
unit.create-enigma.description=End阵营飞行单位，装备黑色弹丸武器，具备防作弊能力
unit.create-enigma.details=[gray]End阵营的小型飞行单位，2000血量，速度4。武器发射黑色虚空弹丸，弹丸会平滑转向跟踪目标，具备比例伤害能力（最大生命值的1/60）。拥有防作弊系统，单次伤害上限900，最大伤害上限1000。[]

unit.create-void-vessel.name=虚空容器
unit.create-void-vessel.description=End阵营飞行单位，装备黑色碎裂弹武器，具备护甲削弱能力
unit.create-void-vessel.details=[gray]End阵营的中型飞行单位，10000血量，速度3，护甲8。装备头部红色大激光（高伤害，充能后发射）和两侧小型碎裂弹（悬停后冲刺穿透）。具备护甲削弱能力和防作弊系统。[]

unit.create-chronos.name=克罗诺斯
unit.create-chronos.description=End阵营飞行单位，拥有时间停止能力，装备时间停止子弹
unit.create-chronos.details=[gray]End阵营的大型飞行单位，17000血量，速度2。拥有时间停止能力，持续15秒，充能时间10秒，触发时快速模拟单位更新让其在瞬间行动多次。武器发射时间停止子弹，造成510点伤害。具备防作弊系统。[]

unit.create-opticaecus.name=盲视者
unit.create-opticaecus.description=End阵营飞行单位，装备红色激光和导弹发射器，具备隐身能力
unit.create-opticaecus.details=[gray]End阵营的大型飞行单位，60000血量，速度1.8，护甲12。装备头部红色激光（360°任意角度可发射）和两侧导弹发射器（追踪+蛇形飞行，造成范围伤害）。具备防作弊系统。[]

unit.create-ravager.name=掠夺者
unit.create-ravager.description=End阵营地面单位（8腿），装备噩梦激光、炮弹和小型炮台，具备防作弊能力
unit.create-ravager.details=[gray]End阵营的超大型地面单位（8腿），1650000血量，速度0.65，护甲15。装备噩梦激光（阻挡点范围爆炸）、炮弹（闪电效果）和追踪导弹。8腿行走，每腿落地造成范围伤害。免疫所有状态效果。具备防作弊系统。[]

unit.create-exowalker.name=外径行者
unit.create-exowalker.description=Plague阵营地面单位（8腿），装备瘟疫导弹发射器和吸血激光
unit.create-exowalker.details=[gray]Plague阵营的中型地面单位（8腿），6000血量，速度0.7，护甲4。装备四座瘟疫导弹发射器（蛇形追踪）和吸血激光（伤害回血）。8腿行走，瘟疫色涂装。不具备防作弊系统（仅End系列单位具备）。[]

unit.create-toxoswarmer.name=瘟疫蜂群
unit.create-toxoswarmer.description=Plague阵营地面单位（6腿），装备8连发追踪导弹，命中后产生火焰
unit.create-toxoswarmer.details=[gray]Plague阵营的中型地面单位（6腿），7000血量，速度1.1，护甲4。装备8连发追踪导弹（蛇形飞行，命中后产生火焰）。6腿行走，瘟疫色涂装。不具备防作弊系统（仅End系列单位具备）。[]

unit.create-desolation.name=荒芜者
unit.create-desolation.description=End阵营终极地面单位（8腿），装备蓄力主炮、点防激光、触手激光，具备防作弊能力
unit.create-desolation.details=[gray]End阵营的终极地面单位（8腿），307300血量，速度0.7，护甲35。装备多种武器：蓄力主炮（高伤害，充能后发射）、点防激光、副炮、闪电炮和触手激光。8腿行走，每腿落地造成范围伤害。免疫所有状态效果。具备防作弊系统。[]

# ========== PU_V8 T6/T7 单位 ==========
unit.create-citadel.name=君主
unit.create-citadel.description=T6 Mech单位，装备磁轨炮和双火焰喷射器
unit.create-citadel.details=[gray]T6 Mech地面单位，60000血量，护甲16，速度0.3。装备磁轨炮（可穿透多个目标）和双火焰喷射器（引燃敌人）。免疫燃烧状态。[]
unit.create-empire.name=帝国
unit.create-empire.description=T7 Mech单位，装备火焰喷射、导弹和炮弹武器
unit.create-empire.details=[gray]T7 Mech地面单位，140000血量，护甲20，速度0.2。装备火焰喷射器、导弹发射器和炮弹，可造成范围伤害并引燃敌人。免疫燃烧和熔融状态。[]
unit.create-cygnus.name=天鹅座
unit.create-cygnus.description=T6 Legs单位，装备治疗激光和EMP弹
unit.create-cygnus.details=[gray]T6 Legs腿单位，45000血量，护甲9，6腿行走。装备治疗激光（可治疗友军）和EMP弹（造成闪电链伤害）。[]
unit.create-sagittarius.name=人马座
unit.create-sagittarius.description=T7 Legs单位，装备蓄力激光和加速箭弹，具备力场护盾
unit.create-sagittarius.details=[gray]T7 Legs腿单位，102500血量，护甲14，4腿行走。装备蓄力激光和治疗箭弹（均可治疗友军）。具备力场护盾可吸收伤害。[]
