# ===== 经验存储运输方块 =====
block.create-exp-tank.name=[#84ff00]Exp.[]槽
block.create-exp-tank.description=存储少量[#84ff00]Exp.[]。\n[lightgray]用法:[] 接受经验球或相邻方块注入；装满后可摧毁回收大部分经验球。自身不会主动输出经验，需配合古代塔/古代节点取出。
block.create-exp-chest.name=[#84ff00]Exp.[]筒仓
block.create-exp-chest.description=存储大量[#84ff00]Exp.[]。\n[lightgray]用法:[] 大容量储罐，接受经验球注入。可用经验卸载器取出经验。摧毁时回收大部分经验球。
block.create-exp-router.name=古代路由器
block.create-exp-router.description=将[#84ff00]Exp.[]球分配到相邻格子。让物品沿直线通过。\n[lightgray]用法:[] 旋转方向决定经验球输出方向；同时充当物品交叉路口，让物品直线通过。
block.create-exp-router.details=早已失去路由物品的功能，只是让它们通过。不过它可以路由[#84ff00]其他东西[]...
block.create-exp-tower.name=古代塔
block.create-exp-tower.description=将[#84ff00]Exp.[]发送到前方的另一个方块。\n[lightgray]用法:[] 旋转方向决定发送方向；自身可存储少量经验，满载或接收经验球时自动向前方范围内的 [#84ff00]Exp.[]持有者发射激光传输经验。是经验槽中经验取出的主要方式之一。
block.create-exp-tower.details=早已失去发送电力的功能。不过它可以发送[#84ff00]其他东西[]...
block.create-exp-node.name=古代节点
block.create-exp-node.description=将[#84ff00]Exp.[]发送到范围内的所有方块。\n[lightgray]用法:[] 消耗电力，自动向范围内所有 [#84ff00]Exp.[]持有者（炮台/墙/储罐）分配经验。是经验槽中经验取出的主要方式之一。
block.create-exp-node.details=早已失去传输电力的功能。不过它可以传输[#84ff00]其他东西[]...
block.create-exp-node-large.name=大型古代节点
block.create-exp-node-large.description=将[#84ff00]Exp.[]发送到范围内的所有方块。范围更大。\n[lightgray]用法:[] 同古代节点，但范围更大，容量更高，适合大型基地经验分配。
block.create-diagonal-tower.name=钢塔
block.create-diagonal-tower.description=将[#84ff00]Exp.[]发送到前方的另一个方块。可配置为对角线发送[#84ff00]Exp.[]。\n[lightgray]用法:[] 点击切换直线/对角线发送模式。
block.create-buffer-tower.name=装甲塔
block.create-buffer-tower.description=将[#84ff00]Exp.[]发送到前方的另一个方块。生命值更高，但在发送前有短暂延迟以及吞吐量上限。适用于限制[#84ff00]Exp.[]速率或逻辑门。\n[lightgray]用法:[] 缓冲模式下每次仅发送少量经验，可作为经验流限速器或逻辑门。
block.create-exp-output.name=[#84ff00]Exp.[]集线器
block.create-exp-output.description=收集相邻经验炮塔获得的一部分[#84ff00]Exp.[]，输出到附近的传送带。\n[lightgray]用法:[] 放在经验炮塔旁边，自动链接范围内的炮塔（最多4个）。炮台击杀敌人获得经验时，集线器抽取一部分存入自身，然后每隔一段时间将经验以经验球形式沿朝向发射到传送带上。朝向决定经验球发射方向。自身不会攻击，仅作经验收集与转移。
block.create-exp-unloader.name=[#84ff00]Exp.[]卸载器
block.create-exp-unloader.description=从相邻的经验储罐/经验塔抽取[#84ff00]Exp.[]，沿朝向发射经验球到传送带。\n[lightgray]用法:[] 放在经验储罐旁边，自动抽取相邻储罐的经验存入自身，然后每隔一段时间将经验以经验球形式沿朝向发射。朝向决定经验球发射方向。用于从储罐取出经验输送到其他地方。不会从炮台抽取经验（炮台需要经验升级）。
block.create-exp-fountain.name=[#84ff00]Exp.[]源
block.create-exp-fountain.description=无限输出[#84ff00]Exp.[]。仅沙盒模式。\n[lightgray]用法:[] 沙盒测试用，持续生成经验球。
block.create-exp-void.name=[#84ff00]Exp.[]黑洞
block.create-exp-void.description=移除任何[#84ff00]Exp.[]。仅沙盒模式。\n[lightgray]用法:[] 自动抽干相邻所有 [#84ff00]Exp.[]持有者的经验并销毁。

