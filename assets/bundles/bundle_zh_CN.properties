# 单位
unit.create-arcnelidia.name=电弧虫
unit.create-arcnelidia.description=带有电弧激光武器的多节飞行单位，由头部和9节段身组成
unit.create-arcnelidia.details=[gray]多节飞行单位，800血量，速度4，护甲5。由头部和9节段身组成，段间距22.7，最大弯曲角度30°。头部装备电弧激光武器（450伤害，长度190，宽度20，需移动速度≥2.1才发射，每10tick射击一次），段身投弹（250范围伤害+25溅射，每72tick投一次）。直线冲向目标越过折返（circleTarget=false）。轻微晃动（wobble=true）。每秒回复10血。[]

unit.create-toxobyte.name=毒疫虫
unit.create-toxobyte.description=携带瘟疫炮弹和吸附激光的多节飞行单位，由头部和25节段身组成，能够再生新段身
unit.create-toxobyte.details=[gray]多节飞行单位，200血量，速度3，碰撞半径14.75。由头部和25节段身组成，段间距16.25，最大弯曲角度30°。头部12发散射SapBullet（吸附激光自动回血，射程130），段身投掷瘟疫炮弹（25伤害+25范围）。环绕目标飞行（circleTarget=true）。每6秒再生一节段身（最多25节）。可分裂（splittable=true，段身死亡时虫子分裂）和链式合并（chainable=true，两条靠近时合并）。每秒回复15血。[]

unit.create-catenapede.name=吸血虫
unit.create-catenapede.description=携带吸血激光和瘟疫导弹的多节飞行单位，由头部和15节段身组成，能够分裂和合并
unit.create-catenapede.details=[gray]多节飞行单位，750血量，速度2.4，护甲5，碰撞半径30。由头部和最多15节段身组成（初始2段），段间距31，最大弯曲角度30°。头部装备吸血激光（持续13.5秒，5秒冷却，吸血0.5%，最大长度160，击退-34拉向自己），段身投掷瘟疫导弹。环绕目标飞行（circleTarget=true）。每20秒再生一节段身（最多15节）。可分裂（splittable=true）和链式合并（chainable=true）。每秒回复25血。[]

unit.create-devourer.name=噬界虫
unit.create-devourer.description=End阵营的超级多节飞行单位，由头部和60节段身组成，全状态免疫，头部发射强大激光，段身配备导弹和激光武器
unit.create-devourer.details=[gray]End阵营超级多节飞行单位，1250000血量，速度5，碰撞半径60.45。由头部和60节段身组成，段间距70.55，最大弯曲角度30°。头部发射强大激光，段身配备导弹和激光武器。全状态免疫。无再生、无分裂、无合并。头部偏移27.75，弹幕同步范围240。每秒回复120血，受到伤害×0.9（减伤10%）。[]

# 正确的 devourer 键名 (代码中实际注册名为 devourer-of-eldrich-gods)
unit.create-devourer-of-eldrich-gods.name=噬界虫
unit.create-devourer-of-eldrich-gods.description=End阵营的超级多节飞行单位，由头部和60节段身组成，全状态免疫，头部发射强大激光，段身配备导弹和激光武器
unit.create-devourer-of-eldrich-gods.details=[gray]End阵营超级多节飞行单位，1250000血量，速度5，碰撞半径60.45。由头部和60节段身组成，段间距70.55，最大弯曲角度30°。头部发射强大激光，段身配备导弹和激光武器。全状态免疫。无再生、无分裂、无合并。头部偏移27.75，弹幕同步范围240。每秒回复120血，受到伤害×0.9（减伤10%）。[]

unit.create-oppression.name=压迫者
unit.create-oppression.description=End阵营的终极多节飞行单位，由头部和55节段身组成，配备主激光、导弹、虚空门户、慢闪电等多种武器，段身间有液压杆连接
unit.create-oppression.details=[gray]End阵营终极多节飞行单位，2500000血量，速度4.5，碰撞半径218。由头部和55节段身组成，段间距228，最大弯曲角度35°。头部配备多种武器：主激光（红色大激光，充能后射击）、导弹、虚空门户（召唤触手）、慢闪电等。段身间有液压杆连接装饰。段身6个武器分3组（每组2个，尾部空组）。大招期间移动和旋转速度降至7.5%（非完全锁定）。环绕目标飞行（circleTarget=true）。弹幕同步范围490。每秒回复500血，受到伤害×0.7（减伤30%）。[]

unit.create-enigma.name=谜团
unit.create-enigma.description=End阵营飞行单位，装备黑色弹丸武器，具备防作弊能力
unit.create-enigma.details=[gray]End阵营的小型飞行单位，2000血量，速度4。武器发射黑色虚空弹丸，弹丸会平滑转向跟踪目标，具备比例伤害能力（最大生命值的1/60）。拥有防作弊系统，单次伤害上限900，最大伤害上限1000。[]

unit.create-void-vessel.name=虚空容器
unit.create-void-vessel.description=End阵营飞行单位，装备黑色碎裂弹武器，具备护甲削弱能力
unit.create-void-vessel.details=[gray]End阵营的中型飞行单位，10000血量，速度3，护甲8。装备两种武器：1) 头部红色大激光（9000伤害，2150长度，140宽度，10秒持续，3连发每发间隔3秒，4秒充能，50秒总周期含10秒冷却）；2) 两侧小型碎裂弹（黑色两阶段：悬停30tick后冲刺穿透+尖刺伤害）。具备护甲削弱模块和防作弊系统（无敌帧+单次伤害上限+抗性递增）。[]

unit.create-chronos.name=克罗诺斯
unit.create-chronos.description=End阵营飞行单位，拥有时间停止能力，装备时间停止子弹
unit.create-chronos.details=[gray]End阵营的大型飞行单位，17000血量，速度2。拥有时间停止能力，持续15秒，充能时间10秒，触发时快速模拟单位更新让其在瞬间行动多次。武器发射时间停止子弹，造成510点伤害。具备防作弊系统。[]

unit.create-opticaecus.name=盲视者
unit.create-opticaecus.description=End阵营飞行单位，装备红色激光和导弹发射器，具备隐身能力
unit.create-opticaecus.details=[gray]End阵营的大型飞行单位，60000血量，速度1.8，护甲12。装备两种武器：1) 头部红色激光（1400伤害，长度390，宽度30，4秒冷却，瞄准锥360°任意角度可发射）；2) 两侧导弹发射器（10连发，每发170伤害+320范围伤害，追踪+蛇形飞行，2秒冷却）。PU132原版具备隐身能力（InvisibleUnitType），v158简化为普通飞行单位。具备防作弊系统（无敌帧+单次伤害上限+抗性递增）。[]

unit.create-ravager.name=掠夺者
unit.create-ravager.description=End阵营地面单位（8腿），装备噩梦激光、炮弹和小型炮台，具备防作弊能力
unit.create-ravager.details=[gray]End阵营的超大型地面单位（8腿），1650000血量，速度0.65，护甲15。装备5种武器：1) 噩梦激光（1210伤害，长度460，宽度26.1，直线碰撞+阻挡点范围爆炸110半径9000伤害，6秒冷却）；2,3) 两门炮弹（5连发，每发130伤害+325范围伤害，闪电效果）；4,5) 两座小型炮台（追踪导弹，330伤害+220范围伤害，蛇形飞行）。8腿行走，每腿落地造成1400范围伤害。免疫所有状态效果。具备防作弊系统（护甲削弱+能力削弱+力场削弱三模块）。[]

unit.create-exowalker.name=外径行者
unit.create-exowalker.description=Plague阵营地面单位（8腿），装备瘟疫导弹发射器和吸血激光
unit.create-exowalker.details=[gray]Plague阵营的中型地面单位（8腿），6000血量，速度0.7，护甲4。装备5种武器：1-4) 四座瘟疫导弹发射器（4连发，9伤害+17范围伤害，蛇形追踪，1.5秒冷却）；5) 吸血激光（43伤害，长度80，吸血0.4%，3连发间隔17.5tick）。8腿行走，瘟疫色（#a3f080）涂装。不具备防作弊系统（仅End系列单位具备）。[]

unit.create-toxoswarmer.name=瘟疫蜂群
unit.create-toxoswarmer.description=Plague阵营地面单位（6腿），装备8连发追踪导弹，命中后产生火焰
unit.create-toxoswarmer.details=[gray]Plague阵营的中型地面单位（6腿），7000血量，速度1.1，护甲4。装备1种武器：8连发追踪导弹（200伤害+30范围伤害，蛇形飞行4秒持续，命中后分裂2个火焰弹：15伤害+燃烧状态4秒）。6腿行走，瘟疫色（#a3f080）涂装。不具备防作弊系统（仅End系列单位具备）。[]

unit.create-desolation.name=荒芜者
unit.create-desolation.description=End阵营终极地面单位（8腿），装备蓄力主炮、点防激光、触手激光，具备防作弊能力
unit.create-desolation.details=[gray]End阵营的终极地面单位（8腿），307300血量，速度0.7，护甲35。装备多种武器：1) 蓄力主炮（DesolationBulletType，2500伤害+三防作弊模块，15秒冷却+8秒持续，蓄力4阶段红色特效）；2,3) 两座点防激光（7连发/5连发，220伤害，15tick冷却）；4-7) 四门副炮（3连发，260伤害，fragBullet虚空碎裂弹）；8,9) 两门闪电炮（2连发，380伤害+220范围+80闪电伤害，穿透3目标）；10) 触手1（EndPointBlast，250伤害+1000范围伤害，3秒冷却）；11-13) 触手2-4（连续激光，180伤害，4秒冷却）。8腿行走，每腿落地造成1700范围伤害。免疫所有状态效果。具备防作弊系统（护甲削弱+能力削弱+力场削弱三模块）。[]

# ========== PU_V8 T6/T7 单位 ==========
unit.create-citadel.name=君主
unit.create-citadel.description=T6 Mech单位，装备磁轨炮和双火焰喷射器
unit.create-citadel.details=[gray]T6 Mech地面单位，60000血量，护甲16，速度0.3。装备两种武器：1) 磁轨炮（RailBulletType，250伤害，长度400，穿透7目标，90帧冷却）；2) 双火焰喷射器（ContinuousFlameBulletType，75伤害，长度90，持续42帧，6目标穿透，引燃20%概率，熔融状态）。免疫燃烧状态。PU_V8原版为UnityUnitType，v158简化为vanilla UnitType+MechUnit。[]
unit.create-empire.name=帝国
unit.create-empire.description=T7 Mech单位，装备火焰喷射、导弹和炮弹武器
unit.create-empire.details=[gray]T7 Mech地面单位，140000血量，护甲20，速度0.2。装备三种武器：1) 火焰喷射器（ContinuousFlameBulletType，100伤害，长度100，引燃25%）；2) 导弹发射器（MissileBulletType，250伤害，8连发，fragBullet破片弹ShrapnelBulletType）；3) 炮弹（ArtilleryBulletType，340伤害+150范围伤害）。免疫燃烧和熔融状态。PU_V8原版为UnityUnitType，v158简化为vanilla UnitType+MechUnit。[]
unit.create-cygnus.name=天鹅座
unit.create-cygnus.description=T6 Legs单位，装备治疗激光和EMP弹
unit.create-cygnus.details=[gray]T6 Legs腿单位，45000血量，护甲9，6腿行走。装备两种武器：1) 治疗激光（LaserBulletType，30伤害，治疗百分比5%，持续16帧）；2) EMP弹（EmpBulletType，13伤害，EMP范围210，闪电7链）。PU_V8原版为UnityUnitType+反射激光，v158简化为vanilla UnitType+LegsUnit+治疗激光。[]
unit.create-sagittarius.name=人马座
unit.create-sagittarius.description=T7 Legs单位，装备蓄力激光和加速箭弹，具备力场护盾
unit.create-sagittarius.details=[gray]T7 Legs腿单位，102500血量，护甲14，4腿行走。装备两种武器：1) 蓄力激光（LaserBulletType，140伤害，治疗百分比3%，持续18帧）；2) 治疗箭弹（BasicBulletType，70伤害，治疗百分比4%）。具备ForceFieldAbility力场护盾（半径90，最大吸收12000伤害）。PU_V8原版为UnityUnitType+SagittariusLaserBulletType，v158简化为vanilla UnitType+LegsUnit。[]
unit.create-araneidae.name=圆网蛛
unit.create-araneidae.description=T6 Legs单位，装备吸血激光和磁轨炮
unit.create-araneidae.details=[gray]T6 Legs腿单位，52000血量，护甲10，8腿行走。装备两种武器：1) 吸血激光（SapBulletType，26伤害，吸射程150）；2) 磁轨炮（RailBulletType，180伤害，长度320，穿透5目标）。PU_V8原版为UnityUnitType，v158简化为vanilla UnitType+LegsUnit。[]
unit.create-theraphosidae.name=捕鸟蛛
unit.create-theraphosidae.description=T7 Legs单位，装备导弹、持续激光和磁轨炮
unit.create-theraphosidae.details=[gray]T7 Legs腿单位，125000血量，护甲14，8腿行走。装备三种武器：1) 导弹（MissileBulletType，150伤害，4连发）；2) 持续吸血激光（SapBulletType，40伤害，持续）；3) 磁轨炮（RailBulletType，220伤害，长度400，穿透6目标）。PU_V8原版为UnityUnitType，v158简化为vanilla UnitType+LegsUnit。[]
unit.create-mantle.name=地幔
unit.create-mantle.description=T6 Flying单位，装备加速激光和双炮弹
unit.create-mantle.details=[gray]T6 Flying飞行单位，54000血量，护甲10，速度2.2。装备两种武器：1) 持续激光（LaserBulletType，55伤害，长度220，持续16帧）；2) 双炮弹（BasicBulletType，80伤害，5连发，4秒冷却）。PU_V8原版为UnityUnitType+AcceleratingLaserBulletType，v158简化为vanilla UnitType+UnitEntity+LaserBulletType。[]
unit.create-aphelion.name=远日点
unit.create-aphelion.description=T7 Flying单位，装备加速激光和闪电炮弹
unit.create-aphelion.details=[gray]T7 Flying飞行单位，130000血量，护甲14，速度1.8。装备两种武器：1) 持续激光（LaserBulletType，90伤害，长度260，持续18帧）；2) 闪电炮弹（BasicBulletType，130伤害，3连发，2秒冷却，命中产生4道闪电）。PU_V8原版为UnityUnitType+AcceleratingLaserBulletType，v158简化为vanilla UnitType+UnitEntity+LaserBulletType。[]
unit.create-sedec.name=壁垒
unit.create-sedec.description=T6 Payload单位，装备治疗激光，具备力场和修复能力
unit.create-sedec.details=[gray]T6 Payload载具单位，45000血量，护甲8，载客量6.2×6.2格。装备治疗激光（LaserBulletType，30伤害，治疗百分比5%）。具备ForceFieldAbility力场（半径80，吸收8000伤害）和RepairFieldAbility修复场（半径80，每帧修复40血）。PU_V8原版为UnityUnitType+HealingConeBulletType，v158简化为vanilla UnitType+UnitEntity+治疗激光。[]
unit.create-trigintaduo.name=天枢
unit.create-trigintaduo.description=T7 Payload单位，装备治疗激光和治疗核弹
unit.create-trigintaduo.details=[gray]T7 Payload载具单位，52500血量，护甲10，载客量8.1×8.1格。装备两种武器：1) 治疗激光（LaserBulletType，40伤害，治疗百分比5%）；2) 治疗核弹（BasicBulletType，90伤害，治疗百分比4%，3连发，范围伤害150）。PU_V8原版为UnityUnitType+HealingNukeBulletType，v158简化为vanilla UnitType+UnitEntity+治疗核弹。[]

