# ProjectUnity 物品 (faction items)
item.create-contagium.name=感染原
item.create-contagium.description=
item.create-dense-alloy.name=致密合金
item.create-dense-alloy.description=铜和铅的基本合金。密度高，因此得名。
item.create-dense-alloy.details=由于铅和铜通常不相融，因此需要在极高的温度和压力下进行加工。尽管在古代遗迹中发现了这种致密合金的痕迹，但目前的技术仍无法承受这样的条件。
item.create-imberium.name=电金
item.create-imberium.description=一件带电的物品，来自Imber。
item.create-irradiant-surge.name=光辉巨浪
item.create-irradiant-surge.description=钚强化巨浪合金。
item.create-luminum.name=铝
item.create-luminum.description=
item.create-monolite.name=灵岩
item.create-monolite.description=
item.create-nickel.name=镍
item.create-nickel.description=一种坚硬而坚韧的金属。地表鲜见大范围矿脉。
item.create-nickel.details=目前尚不清楚Youngcha的母星为何有大量镍。据推测，过去的一次大型碰撞剥离了该行星的大部分地壳。
item.create-steel.name=钢
item.create-steel.description=坚硬、淬火的金属。它能有效保存[#84ff00]Exp.[]，且具有极强的抗腐蚀性。
item.create-stone.name=石头
item.create-stone.description=坚硬且密度适中的资源，广泛分布于外地壳中。
item.create-stone.details=石头似乎能抵抗孳子。然而，在更深处发现的、形成于很久以前的石头痕迹却并非如此，尽管它们更为柔软且用途更广。
item.create-umbrium.name=幽金
item.create-umbrium.description=
item.create-xenium.name=泽尼姆
item.create-xenium.description=
item.create-uranium.name=铀
item.create-uranium.description=一种放射性金属元素，可用于核反应堆。

