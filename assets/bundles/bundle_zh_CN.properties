unit.create-lepidoptera.name=鳞翅
unit.create-lepidoptera.description=T5直升机，装备机枪、导弹和榴弹
unit.create-lepidoptera.details=[gray]T5直升机单位，9500血量，速度1.8。装备三种武器：1) 机枪（BasicBulletType，60伤害，5连发）；2) 导弹（MissileBulletType，120伤害，5连发）；3) 榴弹（ShrapnelBulletType，70伤害+30范围，3连发）。PU_V8原版为直升机带旋翼动画，v158简化为普通飞行单位。[]
unit.create-mantodea.name=螳螂
unit.create-mantodea.description=T6直升机，装备双联防空炮
unit.create-mantodea.details=[gray]T6直升机单位，25000血量，速度1.7。装备两座防空炮（FlakBulletType，35伤害+30范围，4连发，爆炸范围40，对空特化）。PU_V8原版为直升机带旋翼动画，v158简化为普通飞行单位。[]

