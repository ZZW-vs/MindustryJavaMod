unit.create-emission.name=流能
unit.create-emission.description=T3 EMP单位，装备双EMP发射器
unit.create-emission.details=[gray]T3 EMP飞行单位，550血量，速度2.5。装备两种武器：1) 左侧EMP发射器（EmpBulletType，13伤害，EMP范围100，5道闪电）；2) 中央EMP发射器（EmpBulletType，18伤害，EMP范围120，6道闪电）。PU_V8原版为UnityUnitType+EmpBasicBulletType，v158简化为vanilla UnitType+UnitEntity+EmpBulletType。[]
unit.create-waveform.name=镇流
unit.create-waveform.description=T4 EMP单位，装备多联EMP和大型EMP发射器
unit.create-waveform.details=[gray]T4 EMP飞行单位，4500血量，速度2.2。装备两种武器：1) 4座小型EMP炮台（EmpBulletType，15伤害，EMP范围130，5道闪电）；2) 大型EMP发射器（EmpBulletType，30伤害，EMP范围160，8道闪电）。PU_V8原版为UnityUnitType+EmpBasicBulletType+CloneableSetWeapon，v158简化为vanilla UnitType+UnitEntity+EmpBulletType+手动展开武器。[]
unit.create-ultraviolet.name=强磁暴
unit.create-ultraviolet.description=T5 EMP单位，装备10座EMP炮台和大型EMP发射器
