unit.create-discharge.description=T1 EMP单位，装备EMP弹
unit.create-discharge.details=[gray]T1 EMP飞行单位，60血量，速度3。装备EMP弹（EmpBulletType，7伤害，EMP范围60，3道闪电，0.5秒冷却）。PU_V8原版为UnityUnitType+EmpBasicBulletType，v158简化为vanilla UnitType+UnitEntity+EmpBulletType。[]
