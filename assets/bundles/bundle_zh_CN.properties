item.create-spark-alloy.name=火花合金
item.create-spark-alloy.description=威力增强版的电金，重新充能以达到最佳性能。
item.create-super-alloy.name=超级合金
item.create-super-alloy.description=一种以镍为基础的高级合金，具有极高的抗损伤和耐高温性能。
item.create-super-alloy.details=该派系的巅峰成就之一，极少有外人知晓其配方，更遑论制造。近期研究揭示了这种材料可直接武器化的奇异特性...
