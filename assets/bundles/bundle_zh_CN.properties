# 单位
unit.create-arcnelidia.name=电弧虫
unit.create-arcnelidia.description=带有电弧激光武器的多节飞行单位，由头部和9节段身组成
unit.create-arcnelidia.details=双厨狂喜

unit.create-toxobyte.name=毒疫虫
unit.create-toxobyte.description=携带瘟疫炮弹和吸附激光的多节飞行单位，由头部和25节段身组成，能够再生新段身
unit.create-toxobyte.details=双厨狂喜

unit.create-catenapede.name=吸血虫
unit.create-catenapede.description=携带吸血激光和瘟疫导弹的多节飞行单位，由头部和15节段身组成，能够分裂和合并
unit.create-catenapede.details=双厨狂喜

unit.create-devourer.name=噬界虫
unit.create-devourer.description=End阵营的超级多节飞行单位，由头部和60节段身组成，全状态免疫，头部发射强大激光，段身配备导弹和激光武器
unit.create-devourer.details=双厨狂喜

unit.create-oppression.name=压迫者
unit.create-oppression.description=End阵营的终极多节飞行单位，由头部和55节段身组成，配备主激光、导弹、虚空门户、慢闪电等多种武器，段身间有液压杆连接
unit.create-oppression.details=双厨狂喜

unit.create-enigma.name=谜团
unit.create-enigma.description=End阵营飞行单位，装备黑色弹丸武器，具备防作弊能力
unit.create-enigma.details=[gray]End阵营的小型飞行单位，2000血量，速度4。武器发射黑色虚空弹丸，弹丸会平滑转向跟踪目标，具备比例伤害能力（最大生命值的1/60）。拥有防作弊系统，单次伤害上限900，最大伤害上限1000。[]

unit.create-void-vessel.name=虚空容器
unit.create-void-vessel.description=End阵营飞行单位，装备黑色碎裂弹武器，具备护甲削弱能力
unit.create-void-vessel.details=[gray]End阵营的中型飞行单位，10000血量，速度3。武器发射黑色虚空碎裂弹，子弹分两阶段：第一阶段悬停跟踪目标30tick，第二阶段直线冲刺穿透造成大激光伤害，冲刺结束后沿路径生成尖刺伤害。具备护甲削弱模块和防作弊系统。[]

unit.create-chronos.name=克罗诺斯
unit.create-chronos.description=End阵营飞行单位，拥有时间停止能力，装备时间停止子弹
unit.create-chronos.details=[gray]End阵营的大型飞行单位，17000血量，速度2。拥有时间停止能力，持续15秒，充能时间10秒，触发时快速模拟单位更新让其在瞬间行动多次。武器发射时间停止子弹，造成510点伤害。具备防作弊系统。[]
