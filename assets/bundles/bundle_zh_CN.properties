item.create-cupronickel.name=铜镍合金
item.create-cupronickel.description=镍铜基础合金。高效耐用的导热体。
item.create-cupronickel.details=Youngcha对材料科学的精通通常通过这种合金的灵活应用来展现。
item.create-dark-alloy.name=深暗合金
item.create-dark-alloy.description=
item.create-dirium.name=迪里姆合金
item.create-dirium.description=一种由多种元素组成的复合合金。它是[#84ff00]Exp.[]的优良导流体，当注入[#84ff00]Exp.[]时可以重现许多非自然行为。
item.create-dirium.details=目前尚不清楚这种物质是否与古代记载中的"迪里姆合金"为同一种物质。不过，既然它能重现该材料的诸多特性（例如实现物质传送），两者的化学性质应当相差无几。讽刺的是，从化学角度而言，这种物质本不该存在。
item.create-light-alloy.name=光辉合金
item.create-light-alloy.description=
