unit.create-cherub.description=小型飞行治疗单位，可修复友军建筑和单位。
unit.create-cherub.details=[gray]T1治疗飞行单位，70血量，速度3.5。装备1座RepairBeamWeapon（无镜像，射程85，维修速度0.5/帧）。使用NewHealerAI查找受伤友军（单位/建筑）并靠近治疗。PU_V8原版为UnityUnitType+NewHealerAI，v158简化为vanilla UnitType+UnitEntity+RepairBeamWeapon+NewHealerAI。[]
unit.create-malakhim.name=大天使
unit.create-malakhim.description=大型飞行治疗单位，治疗速度更快，范围更广。
unit.create-malakhim.details=[gray]T2治疗飞行单位，220血量，速度2.5。装备1座大型RepairBeamWeapon（无镜像，射程130，维修速度1.5/帧）。使用NewHealerAI查找受伤友军并靠近治疗。PU_V8原版为UnityUnitType+NewHealerAI，v158简化为vanilla UnitType+UnitEntity+RepairBeamWeapon+NewHealerAI。[]
unit.create-seraphim.name=炽天使
unit.create-seraphim.description=最强大的飞行治疗单位，环绕友军持续治疗。
unit.create-seraphim.details=[gray]T3治疗飞行单位，670血量，速度2。装备3座RepairBeamWeapon（各2门镜像共6臂，射程210，每臂维修速度0.65/帧）。circleTarget=true，使用NewHealerAI的circle()围绕目标盘旋持续治疗。PU_V8原版为UnityUnitType+NewHealerAI，v158简化为vanilla UnitType+UnitEntity+RepairBeamWeapon+NewHealerAI。[]

